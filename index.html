<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Progress Bars Example</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      padding: 20px;
    }
    .section {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <h2 class="mb-4">Bootstrap 4 Progress Bars Demo</h2>

  <!-- Basic Progress Bars -->
  <div class="section">
    <h4>Basic Progress Bars</h4>
    <div class="progress mb-2">
      <div class="progress-bar" style="width: 25%"></div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar" style="width: 50%"></div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar" style="width: 100%"></div>
    </div>
  </div>

  <!-- Labeled Progress Bars -->
  <div class="section">
    <h4>Progress Bars with Labels</h4>
    <div class="progress">
      <div class="progress-bar" style="width:70%">70%</div>
    </div>
  </div>

  <!-- Colored Progress Bars -->
  <div class="section">
    <h4>Colored Progress Bars</h4>
    <div class="progress mb-2">
      <div class="progress-bar bg-success" style="width: 20%">Success</div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar bg-info" style="width: 30%">Info</div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar bg-warning" style="width: 40%">Warning</div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar bg-danger" style="width: 50%">Danger</div>
    </div>
  </div>

  <!-- Striped Progress Bars -->
  <div class="section">
    <h4>Striped Progress Bars</h4>
    <div class="progress mb-2">
      <div class="progress-bar progress-bar-striped" style="width: 40%">Striped</div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar bg-info progress-bar-striped" style="width: 50%">Striped Info</div>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar bg-warning progress-bar-striped" style="width: 60%">Striped Warning</div>
    </div>
  </div>

  <!-- Animated Progress Bars -->
  <div class="section">
    <h4>Animated Progress Bars</h4>
    <div class="progress">
      <div class="progress-bar progress-bar-striped progress-bar-animated bg-success"
           style="width: 70%">Animated</div>
    </div>
  </div>

  <!-- Stacked Progress Bars -->
  <div class="section">
    <h4>Stacked Progress Bars</h4>
    <div class="progress">
      <div class="progress-bar bg-success" style="width: 40%">Free Space</div>
      <div class="progress-bar bg-warning" style="width: 10%">Warning</div>
      <div class="progress-bar bg-danger" style="width: 20%">Danger</div>
    </div>
  </div>

  <!-- Bootstrap 4 JS (required) -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
